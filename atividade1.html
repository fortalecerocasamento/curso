<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortalecer o Casamento – Sessão 1</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
}
h1, h2 {
  text-align: center;
}
.section {
  background: #ffffff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}
label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}
textarea, input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}
button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #2c7be5;
  color: #fff;
  cursor: pointer;
}
button:hover {
  background: #1a5fc4;
}
footer {
  text-align: center;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<h1>Fortalecer o Casamento</h1>
<h2>Primeira Sessão</h2>

<form id="atividade">

<!-- ATIVIDADE 1 -->
<div class="section">
  <h2>1️⃣ Abraçar os Princípios do Evangelho</h2>
  <label>Liste até 5 dificuldades atuais do seu casamento:</label>
  <textarea rows="5" placeholder="Ex: comunicação, finanças, tempo juntos..."></textarea>

  <label>Quais princípios do evangelho podem ajudar?</label>
  <textarea rows="3" placeholder="Ex: fé, oração, perdão..."></textarea>

  <label>Uma prática que você vai começar agora:</label>
  <input type="text" placeholder="Ex: orar juntos todos os dias">
</div>

<!-- ATIVIDADE 2 -->
<div class="section">
  <h2>2️⃣ Mudar a Perspectiva</h2>

  <label>O que muda quando você vê seu cônjuge como Deus o vê?</label>
  <textarea rows="3"></textarea>

  <label>O que acontece quando as pressões do mundo dominam?</label>
  <textarea rows="3"></textarea>

  <label>Que mudança você precisa fazer em si mesmo?</label>
  <textarea rows="3"></textarea>
</div>

<!-- ATIVIDADE 3 -->
<div class="section">
  <h2>3️⃣ Rever os Convênios</h2>

  <label>O que seus convênios exigem de você no casamento?</label>
  <textarea rows="3"></textarea>

  <label>Que atitudes práticas você pode adotar no dia a dia?</label>
  <textarea rows="3"></textarea>
</div>

<!-- ATIVIDADE 4 -->
<div class="section">
  <h2>4️⃣ Progredir Passo a Passo</h2>

  <label>Qual comportamento você vai trabalhar primeiro?</label>
  <input type="text" placeholder="Ex: parar de gritar">

  <label>Como você pretende agir de forma diferente?</label>
  <textarea rows="3"></textarea>
</div>

<button type="button" onclick="salvar()">Salvar Respostas</button>

</form>

<footer>
<p>Fortalecer o Casamento – Sessão 1</p>
</footer>

<script>
function salvar() {
  alert("Respostas salvas no aparelho.\nVocê pode tirar print ou copiar para guardar.");
}
</script>

</body>
</html>
