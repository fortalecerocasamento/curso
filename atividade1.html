<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fortalecer o Casamento – Sessão 1</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100vw;
  height: 100vh;
  overflow-x: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
h1, h2 {
  text-align: center;
}
.section {
  background: #ffffff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}
label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}
textarea, input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}
button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #2c7be5;
  color: #fff;
  cursor: pointer;
}
button:hover {
  background: #1a5fc4;
}

.container {
  width: 100%;
  max-width: 100vw;
  background: white;
  border-radius: 0;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex: 1;
}

main {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  -webkit-overflow-scrolling: touch;
}

footer {
  background: #f5f5f5;
  padding: 12px;
  text-align: center;
  font-size: 12px;
  color: #999;
  border-top: 1px solid #eee;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: space-around;
}

footer a {
  color: #667eea;
  text-decoration: none;
  font-weight: bold;
  flex: 1;
  min-width: 70px;
  padding: 8px;
  border-radius: 4px;
  transition: background 0.3s;
}

footer a:active {
  background: #667eea;
  color: white;
}

input, textarea, select {
  font-size: 16px !important;
}

@media (max-width: 600px) {
  body {
    padding: 0;
    margin: 0;
  }
  h1, h2 {
    font-size: 18px;
  }
  .section {
    padding: 12px;
    margin-bottom: 12px;
  }
}
</style>
</head>

<body>

<h1>Fortalecer o Casamento</h1>
<h2>Primeira Sessão</h2>

<form id="atividade">

<!-- ATIVIDADE 1 -->
<div class="section">
  <h2>1️⃣ Abraçar os Princípios do Evangelho</h2>
  <label>Liste até 5 dificuldades atuais do seu casamento:</label>
  <textarea rows="5" placeholder="Ex: comunicação, finanças, tempo juntos..."></textarea>

  <label>Quais princípios do evangelho podem ajudar?</label>
  <textarea rows="3" placeholder="Ex: fé, oração, perdão..."></textarea>

  <label>Uma prática que você vai começar agora:</label>
  <input type="text" placeholder="Ex: orar juntos todos os dias">
</div>

<!-- ATIVIDADE 2 -->
<div class="section">
  <h2>2️⃣ Mudar a Perspectiva</h2>

  <label>O que muda quando você vê seu cônjuge como Deus o vê?</label>
  <textarea rows="3"></textarea>

  <label>O que acontece quando as pressões do mundo dominam?</label>
  <textarea rows="3"></textarea>

  <label>Que mudança você precisa fazer em si mesmo?</label>
  <textarea rows="3"></textarea>
</div>

<!-- ATIVIDADE 3 -->
<div class="section">
  <h2>3️⃣ Rever os Convênios</h2>

  <label>O que seus convênios exigem de você no casamento?</label>
  <textarea rows="3"></textarea>

  <label>Que atitudes práticas você pode adotar no dia a dia?</label>
  <textarea rows="3"></textarea>
</div>

<!-- ATIVIDADE 4 -->
<div class="section">
  <h2>4️⃣ Progredir Passo a Passo</h2>

  <label>Qual comportamento você vai trabalhar primeiro?</label>
  <input type="text" placeholder="Ex: parar de gritar">

  <label>Como você pretende agir de forma diferente?</label>
  <textarea rows="3"></textarea>
</div>

<button type="button" onclick="salvar()">💾 Salvar Respostas</button>
<button type="button" onclick="exportarPDF()" style="background: #1976d2; margin-top: 8px;">📄 Exportar PDF</button>
<button type="button" onclick="compartilharWhatsapp()" style="background: #25d366; margin-top: 8px;">💬 Compartilhar WhatsApp</button>

</form>

<footer>
<a href="index.html">🏠 Início</a>
<a href="atividade2.html">➡️ Próxima</a>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
function salvar() {
  alert("✅ Respostas salvas no aparelho.\nVocê pode exportar em PDF ou compartilhar no WhatsApp.");
}

function coletarRespostas() {
  const fields = document.querySelectorAll('#atividade input, #atividade textarea');
  let respostas = '🏠 FORTALECER O CASAMENTO - SESSÃO 1\n';
  respostas += '📅 Data: ' + new Date().toLocaleDateString('pt-BR') + '\n';
  respostas += '⏰ Hora: ' + new Date().toLocaleTimeString('pt-BR') + '\n\n';
  respostas += '='.repeat(50) + '\n\n';
  
  let contador = 1;
  fields.forEach((field) => {
    const label = field.previousElementSibling?.textContent || 'Pergunta ' + contador;
    const valor = field.value || '(sem resposta)';
    respostas += '❓ ' + label + '\n💬 ' + valor + '\n\n';
    contador++;
  });
  respostas += '='.repeat(50);
  return respostas;
}

function exportarPDF() {
  const element = document.getElementById('atividade');
  const opt = {
    margin: 10,
    filename: 'Atividade-1-Respostas.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 1.5 },
    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
  };
  html2pdf().set(opt).from(element).save();
}

function compartilharWhatsapp() {
  const respostas = coletarRespostas();
  const url = 'https://wa.me/?text=' + encodeURIComponent(respostas);
  window.open(url, '_blank');
}
</script>

</body>
</html>
